name: Build Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (ci with fallback)
        shell: bash
        run: |
          npm ci || npm install

      - name: Build extension
        run: npm run build

      - name: Package extension (if script exists)
        run: npm run zip --if-present

      - name: Locate package files
        id: packages
        shell: bash
        run: |
          mapfile -t files < <(find .output -type f \( -name "*.zip" -o -name "*.xpi" \))
          if [ ${#files[@]} -eq 0 ]; then
            echo "No package files found under .output"
            find .output -maxdepth 5 -type f || true
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-reader-extension-zip
          path: ${{ steps.packages.outputs.files }}
          if-no-files-found: error

      - name: Generate release tag
        id: tag
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.packages.outputs.files }}
          generate_release_notes: true
